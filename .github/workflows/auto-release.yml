name: Auto Release Plugin

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/workflows/**' # To prevent infinite loops if we only update the workflow itself
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating a release and uploading assets

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Plugin Distribution
        run: ./gradlew buildPlugin --no-daemon --no-configuration-cache

      - name: Extract Version
        id: properties
        shell: bash
        run: |
          # Try to get version from gradle properties if it exists, otherwise define a default
          VERSION=$(./gradlew properties -q | grep "version:" | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.properties.outputs.version }}.${{ github.run_number }}"
          name: "Release v${{ steps.properties.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            Automated release from the `main` branch.
            - **Commit**: ${{ github.sha }}
            - **Run Number**: ${{ github.run_number }}
          files: build/distributions/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
